<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Atendimentos</title>
  <link rel="stylesheet" href="agenda.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <header>
      <h1>Painel de Atendimentos</h1>
      <div class="topInfo">
        <div id="data"></div>
        <div id="relogio"></div>
      </div>
    </header>

    <!-- Filtros de data -->
    <section class="filtros">
      <button class="btnFiltro ativo" onclick="mudarFiltro('hoje', this)">Hoje</button>
      <button class="btnFiltro" onclick="mudarFiltro('amanha', this)">Amanhã</button>
      <button class="btnFiltro" onclick="mudarFiltro('semana', this)">Semana</button>
    </section>

    <!-- NOVO: Filtro por professor (Aula Zero) -->
    <section class="filtros" style="margin-top: 10px; align-items: center;">
      <label for="filtroProfessor" style="color: white; margin-right: 10px;">Professor (Aula Zero):</label>
      <select id="filtroProfessor" class="btnFiltro" style="padding: 8px 16px;">
        <option value="todos">Todos</option>
      </select>
    </section>

    <!-- Dashboard de resumo -->
    <section class="dashboard">
      <div class="cardResumo">
        <span>Atendimentos Hoje</span>
        <strong id="contadorTotal">0</strong>
      </div>
      <div class="cardResumo status-proximo">
        <span>⏰ Próximos (30min)</span>
        <strong id="contadorProximos">0</strong>
      </div>
      <div class="cardResumo status-andamento">
        <span>🟢 Em Andamento</span>
        <strong id="contadorAndamento">0</strong>
      </div>
      <div class="cardResumo status-finalizado">
        <span>✅ Finalizados Hoje</span>
        <strong id="contadorFinalizados">0</strong>
      </div>
      <div class="cardResumo">
        <span>Professores Aula Zero</span>
        <div id="contadorProf"></div>
      </div>
    </section>

    <!-- Lista de agendamentos -->
    <section id="agenda" class="agenda"></section>
    <div id="semAgenda" class="semAgenda">Nenhum agendamento encontrado</div>
  </div>

  <!-- Toast de notificação -->
  <div id="toast" class="toast"></div>

  <!-- Áudio de alerta (opcional) -->
  <audio id="alertaSom">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
  </audio>

  <!-- Script principal -->
  <script src="agenda.js"></script>
</body>
</html>
